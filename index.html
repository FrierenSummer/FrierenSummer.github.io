<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秋果的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
        }
        body {
            background-color: #66CCFF;
            color: #1d1d1f;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px;
            line-height: 1.6;
        }
        .welcome-top-area {
            text-align: center;
            margin-bottom: 55px;
        }
        .ciallo-text {
            font-size: 34px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .title-text {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        .section-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .item-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .item-tag {
            padding: 8px 16px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            font-size: 13px;
            color: #333;
            transition: 0.2s;
            text-decoration: none;
        }
        .item-tag:hover {
            background: rgba(255,255,255,0.95);
        }
        .contact-wrap {
            text-align: center;
            margin: 10px 0 30px;
        }
        .contact-btn {
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 9999px;
            padding: 11px 36px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .contact-btn:hover {
            background: #0066CC;
            transform: scale(1.02);
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="welcome-top-area">

        <div class="item-list">
            <a class="item-tag" href="https://www.bilibili.com/bangumi/media/md8892/" target="_blank">紫罗兰永恒花园</a>
